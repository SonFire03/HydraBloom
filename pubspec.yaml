name: hydra_bloom
description: HydraBloom - cute hydration reminder app (local-only).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^17.2.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  timezone: ^0.9.4
  provider: ^6.1.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - photo/Goutili.png
    - photo/Florali.png
    - photo/Néréabelle.png
